<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Reaction - Voting Permainan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style2.css" />
  </head>
  <body>
    <div class="container">
      <div class="card form-container p-4 shadow-sm mx-auto">
        <h2 class="text-center mb-4">Yuk, beri nilai untuk permainan kita!</h2>

        <form id="feedbackForm" onsubmit="return false;">
          <div class="emoji-group mb-4">
            <input type="radio" class="btn-check" name="rating" id="r1" value="Bosan" />
            <label for="r1" class="emoji-label"><img src="assets/img/bosan.png" alt="Bosan" />Bosan</label>

            <input type="radio" class="btn-check" name="rating" id="r2" value="Kurang" />
            <label for="r2" class="emoji-label"><img src="assets/img/kurang.png" alt="Kurang" />Kurang</label>

            <input type="radio" class="btn-check" name="rating" id="r3" value="Biasa" />
            <label for="r3" class="emoji-label"><img src="assets/img/biasa.png" alt="Biasa" />Biasa</label>

            <input type="radio" class="btn-check" name="rating" id="r4" value="Puas" />
            <label for="r4" class="emoji-label"><img src="assets/img/Puas.png" alt="Puas" />Puas</label>

            <input type="radio" class="btn-check" name="rating" id="r5" value="Sangat Puas" />
            <label for="r5" class="emoji-label"><img src="assets/img/sangat-puas.png" alt="Sangat Puas" />Sangat Puas</label>
          </div>

          <textarea id="feedback" class="form-control mb-3" rows="3" placeholder="Masukan Pesan Kesan anda (opsional)"></textarea>
          <button type="button" class="btn-custom" onclick="submitData()">Kirim</button>
        </form>
      </div>
    </div>

    <div id="custom-alert">
      <div class="alert-box">
        <p id="alert-message" style="font-size: 18px; margin: 0"></p>
        <button class="btn-custom" style="margin-top: 25px; width: auto; padding: 10px 30px" onclick="closeAlert()">Tutup</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const { createClient } = supabase;
      const supabaseClient = createClient("https://fpxlrisbwrxitqqusnph.supabase.co", "sb_publishable_ui1Ag7QLz03qxX8MC5EafA_FjDGap0s");

      function showAlert(msg) {
        document.getElementById("alert-message").innerText = msg;
        document.getElementById("custom-alert").style.display = "flex";
      }

      function closeAlert() {
        document.getElementById("custom-alert").style.display = "none";
        if (document.getElementById("alert-message").innerText.includes("Terima kasih")) location.reload();
      }

      async function submitData() {
        const feedbackValue = document.getElementById("feedback").value.trim();

        // Mengambil nilai rating dari radio button yang sedang di-check oleh user
        const selectedRadio = document.querySelector('input[name="rating"]:checked');
        const selectedRating = selectedRadio ? selectedRadio.value : "";

        // Validasi Input
        if (!selectedRating) {
          showAlert("Pilih salah satu emoji dulu ya!");
          return;
        }

        // Kirim ke database Supabase
        const { error } = await supabaseClient.from("feedbacks").insert([
          {
            rating: selectedRating,
            feedback_text: feedbackValue || null,
            name: null,
          },
        ]);

        if (error) {
          showAlert("Gagal kirim: " + error.message);
        } else {
          showAlert("Terima kasih sudah memberikan masukan!");
        }
      }
    </script>
  </body>
</html>
