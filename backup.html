<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengisian Voting Permainan</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h3 { text-align: center; color: #1a1a1a; margin-bottom: 35px; font-weight: 600; font-size: 24px; }
        
        .emojis { display: flex; justify-content: space-between; margin-bottom: 35px; gap: 10px; }
        .emoji-item { cursor: pointer; text-align: center; padding: 15px 10px; border-radius: 20px; border: 2px solid #eee; background: #fafafa; transition: all 0.3s ease; flex: 1; }
        .emoji-item:hover { border-color: #00c853; background: #f8fff8; }
        .emoji-item .material-symbols-outlined { font-size: 50px; color: #888; transition: all 0.3s ease; }
        

        .emoji-item.selected { border-width: 2px; }
        .emoji-item.selected[data-rating="Bosan"] { border-color: #f44336; background: #fff5f5; }
        .emoji-item.selected[data-rating="Bosan"] .material-symbols-outlined { color: #f44336; }
        .emoji-item.selected[data-rating="Kurang"] { border-color: #ff9800; background: #fff9f0; }
        .emoji-item.selected[data-rating="Kurang"] .material-symbols-outlined { color: #ff9800; }
        .emoji-item.selected[data-rating="Biasa"] { border-color: #ffc107; background: #fffdf0; }
        .emoji-item.selected[data-rating="Biasa"] .material-symbols-outlined { color: #ffc107; }
        .emoji-item.selected[data-rating="Puas"] { border-color: #8bc34a; background: #f6fbf2; }
        .emoji-item.selected[data-rating="Puas"] .material-symbols-outlined { color: #8bc34a; }
        .emoji-item.selected[data-rating="Sangat Puas"] { border-color: #00c853; background: #e8f5e9; }
        .emoji-item.selected[data-rating="Sangat Puas"] .material-symbols-outlined { color: #00c853; }
        
        .emoji-text { font-size: 13px; color: #555; margin-top: 8px; font-weight: 600; }
        
        input, textarea { width: 100%; padding: 16px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 14px; box-sizing: border-box; font-family: 'Poppins', sans-serif; font-size: 15px; }
        input:focus, textarea:focus { border-color: #00c853; outline: none; }
        
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #00c853, #00a846); color: white; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; font-size: 18px; }
        
        #custom-alert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .alert-box { background: white; padding: 40px; border-radius: 24px; text-align: center; width: 80%; max-width: 350px; }
        .alert-box button { background: #00c853; margin-top: 25px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Yuk, beri nilai untuk permainan kita!</h3>
    <div class="emojis">
        <div class="emoji-item" data-rating="Bosan" onclick="select(this, 'Bosan')"><span class="material-symbols-outlined">sentiment_very_dissatisfied</span><div class="emoji-text">Bosan</div></div>
        <div class="emoji-item" data-rating="Kurang" onclick="select(this, 'Kurang')"><span class="material-symbols-outlined">sentiment_dissatisfied</span><div class="emoji-text">Kurang</div></div>
        <div class="emoji-item" data-rating="Biasa" onclick="select(this, 'Biasa')"><span class="material-symbols-outlined">sentiment_neutral</span><div class="emoji-text">Biasa</div></div>
        <div class="emoji-item" data-rating="Puas" onclick="select(this, 'Puas')"><span class="material-symbols-outlined">sentiment_satisfied</span><div class="emoji-text">Puas</div></div>
        <div class="emoji-item" data-rating="Sangat Puas" onclick="select(this, 'Sangat Puas')"><span class="material-symbols-outlined">sentiment_very_satisfied</span><div class="emoji-text">Sangat Puas</div></div>
    </div>
    
    <textarea id="feedback" rows="4" placeholder="Tuliskan masukan atau saranmu..."></textarea>
    <input type="text" id="name" placeholder="Masukkan nama kamu">
    <button onclick="submitData()">Kirim Masukan</button>
</div>

<div id="custom-alert">
    <div class="alert-box">
        <p id="alert-message" style="font-size: 18px;"></p>
        <button onclick="closeAlert()">Tutup</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const supabaseClient = createClient('https://fpxlrisbwrxitqqusnph.supabase.co', 'sb_publishable_ui1Ag7QLz03qxX8MC5EafA_FjDGap0s');
    
    let selectedRating = "";

    function showAlert(msg) {
        document.getElementById('alert-message').innerText = msg;
        document.getElementById('custom-alert').style.display = 'flex';
    }

    function closeAlert() {
        document.getElementById('custom-alert').style.display = 'none';
        if(document.getElementById('alert-message').innerText.includes("Terima kasih")) location.reload();
    }

    function select(el, val) {
        selectedRating = val;
        document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    async function submitData() {
        
        const feedbackValue = document.getElementById('feedback').value.trim();
        const nameValue = document.getElementById('name').value.trim();

        
        if (!selectedRating) {
            showAlert("Pilih salah satu emojidulu ya!");
            return;
        }
        
        if (!nameValue) {
            showAlert("Masukkan nama kamu dulu ya!");
            return;
        }

        if (!feedbackValue) {
            showAlert("Tuliskan masukan atau saranmu ya!");
            return;
        }

        const { error } = await supabaseClient.from('feedbacks').insert([{ 
            rating: selectedRating, 
            feedback_text: feedbackValue, 
            name: nameValue 
        }]);

        if (error) {
            showAlert("Gagal kirim: " + error.message);
        } else {
            showAlert("Terima kasih sudah memberikan masukan!");
        }
    }
</script>
</body>
</html>
