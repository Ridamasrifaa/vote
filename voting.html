<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 30px; font-weight: 600; }
        
        .item { margin-bottom: 22px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; font-size: 15px; color: #333; }
        
        .progress-bg { background: #f0f0f0; height: 14px; border-radius: 8px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; width: 0%; transition: width 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        
        .fill-Bosan { background-color: #f44336; }
        .fill-Kurang { background-color: #ff9800; }
        .fill-Biasa { background-color: #ffc107; }
        .fill-Puas { background-color: #8bc34a; }
        .fill-Sangat-Puas { background-color: #00c853; }
        
        .total-box { margin-top: 35px; padding-top: 20px; border-top: 2px solid #f9f9f9; text-align: center; font-size: 16px; font-weight: 600; color: #2b2b2b; }
        #loading { text-align: center; color: #888; padding: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Hasil Voting </h2>
    <div id="hasil">
        <p id="loading">Sedang menghitung suara...</p>
    </div>
    <div id="total" class="total-box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient(
        'https://fpxlrisbwrxitqqusnph.supabase.co', 
        'sb_publishable_ui1Ag7QLz03qxX8MC5EafA_FjDGap0s'
    );

    async function hitungRekap() {
        const { data, error } = await supabaseClient.from('feedbacks').select('rating');
        
        if (error) {
            document.getElementById('hasil').innerHTML = "Gagal memuat data.";
            return;
        }

        const totalResponden = data.length;
        const kategori = [
            {nama: 'Bosan', class: 'Bosan'}, 
            {nama: 'Kurang', class: 'Kurang'}, 
            {nama: 'Biasa', class: 'Biasa'}, 
            {nama: 'Puas', class: 'Puas'}, 
            {nama: 'Sangat Puas', class: 'Sangat-Puas'}
        ];
        
        const counts = { 'Bosan': 0, 'Kurang': 0, 'Biasa': 0, 'Puas': 0, 'Sangat Puas': 0 };

        data.forEach(item => {
            if (counts.hasOwnProperty(item.rating)) counts[item.rating]++;
        });

        let html = '';
        kategori.forEach(k => {
           
            const persentase = totalResponden > 0 ? (counts[k.nama] / totalResponden * 100) : 0;
            
            html += `
                <div class="item">
                    <div class="label-row">
                        <span>${k.nama}</span>
                        <span>${counts[k.nama]}</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill fill-${k.class}" style="width: ${persentase}%"></div>
                    </div>
                </div>`;
        });
        
        document.getElementById('hasil').innerHTML = html;
        document.getElementById('total').innerText = "Total Partisipan: " + totalResponden + " orang";
    }

    hitungRekap();
</script>
</body>
</html>
