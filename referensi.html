<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form reaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card form-container p-4 shadow-sm mx-auto">
        <h2 class="text-center mb-4">Yuk Kasih FeedBack</h2>

        <form action="" method="post">
          <div class="emoji-group mb-4">
            <!-- emoji 1 -->
            <input type="radio" class="btn-check" name="rating" id="r1" />
            <label for="r1" class="emoji-label"><span>😵</span>Bosan</label>
            <!-- emoji 2 -->
            <input type="radio" class="btn-check" name="rating" id="r2" />
            <label for="r2" class="emoji-label"><span>😕</span>Kurang</label>
            <!-- emojii 3 -->
            <input type="radio" class="btn-check" name="rating" id="r3" />
            <label for="r3" class="emoji-label"><span>😐</span>Biasa</label>
            <!-- emoji 4 -->
            <input type="radio" class="btn-check" name="rating" id="r4" />
            <label for="r4" class="emoji-label"><span>😊</span>Puas</label>
            <!-- emoji 5 -->
            <input type="radio" class="btn-check" name="rating" id="r5" />
            <label for="r5" class="emoji-label"><span>🤩</span>Sangat Puas</label>
          </div>
          <input type="text" class="form-control mb-4" placeholder="Masukan Nama Anda...">
          <textarea class="form-control mb-3" rows="3" placeholder="Silahkan Pesan Kesan Anda Sampaikan"></textarea>
          <button type="submit" class="btn-custom">Kirim</button>
        </form>
      </div>
    </div>
  </body>
</html>
